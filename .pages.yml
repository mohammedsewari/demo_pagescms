media: public
content:
  - name: site
    label: Site Content
    type: file
    path: content.json
    fields:
      - name: hero
        label: Hero Section
        type: object
        fields:
          - name: title
            label: Title
            type: string
          - name: subtitle
            label: Subtitle
            type: string
      - name: about
        label: About Section
        type: object
        fields:
          - name: text
            label: About Text
            type: text
  - name: pages
    label: Pages
    type: collection
    path: pages
    filename: '{fields.slug}.json'
    format: json
    fields:
      - name: title
        label: Page Title
        type: string
      - name: slug
        label: URL Slug
        type: string
      - name: hero
        label: Hero Section
        type: object
        fields:
          - name: title
            label: Title
            type: string
          - name: subtitle
            label: Subtitle
            type: string
      - name: body
        label: Page Content
        type: text

  - name: posts
    label: Blog Posts
    type: collection
    path: posts
    filename: '{fields.slug}.json'
    format: json
    fields:
      - name: title
        label: Title
        type: string
      - name: slug
        label: URL Slug
        type: string
      - name: date
        label: Date
        type: date
      - name: image
        label: Cover Image
        type: image
      - name: body
        label: Body
        type: rich-text